name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.94.0'
          targets: wasm32-wasip1

      - uses: actions/setup-node@v4
        with:
          node-version: '24.11.1'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Moon outputs
        uses: actions/cache@v4
        with:
          path: .moon/cache
          key: ${{ runner.os }}-moon-${{ hashFiles('**/*.toml', '**/*.yml', '**/*.json', 'src/**', 'tui/src/**', 'fixtures/**') }}
          restore-keys: ${{ runner.os }}-moon-

      - name: Install TUI deps
        run: npm ci --prefix tui

      - name: Run core:ci
        run: npx --package @moonrepo/cli@2.2.1 moon run core:ci

      - name: Install Rust coverage tooling
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked

      - name: Run core:coverage
        run: npx --package @moonrepo/cli@2.2.1 moon run core:coverage

      - name: Upload Rust coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: |
            target/coverage/html
            target/coverage/lcov.info

      - name: Summarize User-Agent coverage
        run: |
          {
            echo '## User-Agent coverage'
            echo ''
            echo 'Rust coverage report: artifact `rust-coverage`'
            echo ''
            echo 'User-Agent/disclosure tests expected in coverage:'
            echo '- attestation::tests::user_agent_suffix_is_readable_and_stable'
            echo '- attestation::tests::reserved_headers_are_removed_before_host_headers_are_appended'
            echo '- host::tests::visible_identity_appends_marker_and_readable_attestation'
            echo '- host::tests::hidden_identity_uses_only_sidecar_user_agent'
            echo '- controller::host_imports::ua::tests::ua_set_helper_replaces_sidecar_user_agent'
            echo '- controller::host_imports::ua::tests::ua_set_helper_rejects_invalid_utf8'
            echo '- controller::host_imports::ua::tests::identity_disclosure_helper_toggles_runtime_policy'
          } >> "$GITHUB_STEP_SUMMARY"
