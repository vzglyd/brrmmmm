$schema: './.moon/cache/schemas/project.json'

language: 'rust'

project:
  title: 'brrmmmm core'
  description: 'Rust host runtime and CLI for VZGLYD sidecar WASM modules.'

tasks:
  fmt:
    command: 'cargo fmt'
    args:
      - '--check'
    inputs:
      - 'src/**/*'
      - 'tests/**/*'

  clippy:
    command: 'cargo clippy'
    args:
      - '--all-targets'
      - '--'
      - '-D'
      - 'warnings'
    deps:
      - 'fixture-sidecar:target'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**/*'
      - 'tests/**/*'
      - 'fixtures/deterministic-sidecar/**/*'

  check:
    command: 'cargo check'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**/*'
      - 'tests/**/*'
      - 'fixtures/deterministic-sidecar/**/*'

  docs:
    command: 'cargo doc'
    args:
      - '--no-deps'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**/*'

  test:
    command: 'cargo test'
    deps:
      - 'fixture-sidecar:target'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**/*'
      - 'tests/**/*'
      - 'fixtures/deterministic-sidecar/**/*'

  coverage:
    command: 'bash'
    args:
      - '-lc'
      - 'export CARGO_INCREMENTAL=0 CARGO_TARGET_DIR=/tmp/brrmmmm-coverage-target; cargo llvm-cov --lib --package brrmmmm --no-report && cargo llvm-cov report --html --output-dir target/coverage && cargo llvm-cov report --lcov --output-path target/coverage/lcov.info'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**/*'
    outputs:
      - 'target/coverage/html'
      - 'target/coverage/lcov.info'

  build:
    command: 'cargo build'
    args:
      - '--release'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**/*'
    outputs:
      - 'target/release/brrmmmm'

  package:
    command: 'cargo package'
    args:
      - '--allow-dirty'
    deps:
      - 'build'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**/*'
      - 'README.md'

  ci:
    command: 'cargo metadata'
    args:
      - '--no-deps'
      - '--format-version'
      - '1'
    deps:
      - 'fmt'
      - 'clippy'
      - 'docs'
      - 'check'
      - 'test'
      - 'tui:check'
      - 'fixture-sidecar:build'
    options:
      runDepsInParallel: false

  release-dry-run:
    command: 'cargo package'
    args:
      - '--allow-dirty'
    deps:
      - 'ci'
    options:
      runDepsInParallel: false
